<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Palindrome Checker</title>
    <link href="styles.css" rel="stylesheet" type="text/css">
</head>
<body>
<header><h1>Is it a Palindrome?</h1></header>
<div>
<label for="text-input">Enter in text to check for a palindrome:</label>
<input id="text-input" name="text-input" placeholder="text" type="text" value=""/>
<button id="check-btn">check</button>
<p hidden id="result"></p>
</div>
<p class="palindrome-definition">A palindrome is a word or phrase that reads the same backwards as forwards, for example madam or nurses run.</p>


<script src="script.js"></script>
</body>

</html>
