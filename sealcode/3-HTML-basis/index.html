<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatPhotoApp</title>
</head>

<body>
    <main>
    <header>
        <h1>Cat Photo App</h1>
    </header>
    <section>
        <h2>Cat Photos</h2>
        <p>Everyone loves <a href="https://cdn.freecodecamp.org/curriculum/cat-photo-app/running-cats.jpg">cute
                cats</a>online!</p>
        <p>See more <a target="_blank" href="https://freecatphotoapp.com">cat photos</a> in our gallery</p>
        <a href="https://freecatphotoapp.com"><img
                src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/relaxing-cat.jpg"
                alt="A cute orange cat lying on its back."></a>
    </section>
    <section>
        <h2>Cat list:</h2>
        <h2>Things that cats love:</h2>
        <ul>
            <li>catnip</li>
            <li>lasagne</li>
            <li>balls</li>
        </ul>
        <figure>
            <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/lasagna.jpg" alt="A slice of lasagna on a plate">
            <figcaption>Cat <em>loves</em> lasagna</figcaption>
        </figure>
        <h3>Top three things cat hate:</h3>
        <ol>
            <li>flra treatment</li>
            <li>thunder</li>
            <li>unknown cats</li>
        </ol>
        <figure>
            <img src="https://cdn.freecodecamp.org/curriculum/cat-photo-app/cats.jpg" alt="Kittend on couch">
            <figcaption>Cats <strong>hate</strong> other cats</figcaption>
        </figure>
    </section>
    </main>
    <footer>
        <p>Cat page</p>
    </footer>
</body>
    
</html>
